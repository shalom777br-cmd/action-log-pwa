<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>行動記録</title>

  <link rel="manifest" href="manifest.json">

  <style>
    body {
      font-family: sans-serif;
      margin: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      margin-bottom: 10px;
    }

    button {
      padding: 10px 14px;
      margin-right: 5px;
    }

    .log {
      border-bottom: 1px solid #ddd;
      padding: 8px 0;
    }

    .time {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

  <h2>行動記録</h2>

  <input id="textInput" placeholder="行動を入力 or 音声入力してください">

  <button onclick="saveLogFromInput()">保存</button>
  <button onclick="startVoice()">🎤 音声入力</button>

  <h3>履歴</h3>
  <div id="logList"></div>

  <script src="app.js"></script>

</body>
</html>
